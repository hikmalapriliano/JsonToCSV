<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON To CSV Converter</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://kit.fontawesome.com/a2d9a62f5a.js" crossorigin="anonymous"></script>
</head>
<body data-theme="light">
  <!-- Tombol Ganti Tema -->
  <div class="theme-toggle" id="themeToggle">
    <i class="fas fa-moon"></i>
    <span>Dark</span>
  </div>

  <!-- Header -->
  <header>
    <h1>JSON To CSV Converter</h1>
    <p>Ubah data JSON menjadi CSV dengan cepat dan Gratis.</p>
  </header>

  <!-- Kontainer Utama -->
  <div class="container">
    <!-- Input JSON -->
<div class="card">
  <h3>Input JSON</h3>

  <!-- Tombol Upload JSON File di bawah judul -->
  <div class="upload-group top">
    <input type="file" id="jsonFile" accept=".json" hidden />
    <label for="jsonFile" class="upload-btn full">
      <i class="fas fa-upload"></i> Upload JSON File
    </label>
  </div>

  <p>Klik untuk pilih file JSON atau drag & drop</p>

  <textarea id="jsonInput" placeholder='Tempel JSON di sini.'></textarea>

  <div class="btn-group">
    <button class="primary" id="convertBtn">Convert → CSV</button>
    <button class="secondary" id="clearBtn">Clear</button>
  </div>
</div>


    <!-- Hasil CSV -->
    <div class="card">
      <h3>Hasil CSV</h3>
      <textarea id="csvOutput" placeholder="CSV output akan muncul di sini..." readonly></textarea>
      <div class="btn-group">
        <button class="primary" id="downloadBtn">Download CSV</button>
        <button class="secondary" id="copyBtn">Copy ke Clipboard ✓</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    Made with — <a href="#">Hikmal Apriliano</a>
  </footer>

  <!-- External JS -->
  <script src="script.js"></script>
</body>
</html>
